<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>Unordered List Exercise</h1>

    <h2>Example 1: Fruits</h2>
    <ul style="list-style-type: circle;">
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
        <li>Mango</li>
    </ul>

    <h2>Example 2: School Supplies </h2>
    <ul style="list-style-type: square;">
        <li>Pen</li>
        <li>Notebook</li>
        <li>Ruler</li>
        <li>Eraser</li>
    </ul>
    <h2>Example 3: Hobbies</h2>
    <ul style="list-style-type: disc;">
        <li>Reading</li>
        <li>Drawing</li>
        <li>Playing Football</li>
        <li>Listening Music</li>
    </ul>
</body>
</html>
