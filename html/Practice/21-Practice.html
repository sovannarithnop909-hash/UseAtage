<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="" style="margin-right:600px; background-image: url();">
      <div
        align="center"
        style="
          border: 1px solid;
          text-align: center;
          border-color: black;
          width: 400px;
          height: 500px;
          font-family:
            &quot;Gill Sans&quot;, &quot;Gill Sans MT&quot;, Calibri,
            &quot;Trebuchet MS&quot;, sans-serif;
          background-color: aliceblue;
          border-radius: 20px;
        "
      >
        <h1 align="center">👋</h1>
        <h2 align="center">Login</h2>
        <span style="margin-right: 160px; font-weight: 600; font-size: 20px"
          >Email</span
        ><br />
        <input
          style="width: 200px; height: 40px; border-radius: 20px;"
          type="email"
          placeholder="Enter your Email..."
        /><br /><br />
        <span style="margin-right: 130px; font-weight: 600; font-size: 20px"
          >Password</span
        ><br />
        <input
          style="width: 200px; height: 40px; border-radius: 20px;"
          type="password"
          placeholder="Enter your password..."
        /><br /><br />
        <button
          style="
            width: 200px;
            height: 40px;
            background-color: blue;
            color: azure;
            font-size: 20px;
            font-weight: 500 bold;
            border-radius: 20px;
          "
        >
          Login
        </button>
        <p>___________or___________</p>
        <img
          width="150px"
          src="https://i.pinimg.com/736x/2f/41/68/2f4168e770cbfa2cd5f87429f911c4ea.jpg"
          alt=""
        />
