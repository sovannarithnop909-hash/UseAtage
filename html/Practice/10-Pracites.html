<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Login</title>
</head>
<body>
    <h2>Student Registration Form</h2>
    <label>Full Name:</label><br>
    <input type="text" name="Fullname" placeholder="Enter your Full Name: "><br><br>

    <label>User Name:</label><br>
    <input type="text" placeholder="Enter your username:"><br><br>

    <label >Password:</label><br>
    <input type="password" placeholder="Enter your password"><br><br>

    <label>Email:</label><br>
    <input type="email" placeholder="Enter your email"><br><br>

    <label>Age:</label><br>
    <input type="number" placeholder="Enter your age"><br><br>

    <label>Phone:</label><br>
    <input type="number" placeholder="Enter your phone number"><br><br>

    <input type="submit" value="Register">
    <input type="reset" value="clear">

</body>
</html>
