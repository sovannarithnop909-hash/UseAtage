<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML marquee Tage</title>
  </head>
  <body>
    <h1><center>HTML marquee</center></h1>
    <hr size="5" color="red" />
    <marquee><h2>This is example of marquee</h2></marquee>
    <marquee width="50%">
      <h3>This is example will take only 50% width</h3>
    </marquee>
    <marquee direction="right">
      <h3>This is text will scroll from left to right</h3>
    </marquee>
    <marquee direction="up" width = 50% >
      <h3>This is text will scroll from bottom to up</h3>
    </marquee>
  </body>
</html>
