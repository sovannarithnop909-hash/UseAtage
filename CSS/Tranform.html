<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .card{
        width: 300px;
        height: 450px;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
        border-radius: 10px;
        background-color: floralwhite;
        padding: 20px;
        position: relative;
    }
    .cart-img{
        width: 260px;
        height: 310px;
        border-radius: 10px;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px, rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
    }
    .cart-img img{
        width: 100%;
        height: 100%;
        border-radius: 10px;
       
    }
    .button-click{
        width: 100px;
        height: 40px;
        background-color: blue;
        border-radius: 10px;
        margin-top: 25px;
        overflow: hidden;

    }
    .button-click button{
        width: 100%;
        height: 100%;
       background-color: blue;
        border-style: none;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px, rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;

    }
    .absolute{
        width: 50px;
        height: 100px;
        bottom: 30px;
        right: 0;
        transform: translateX(50px);
        position: absolute;
        transition: all 0.2s ease-in-out;
        background-color: green;

    }
    .card:hover .absolute{
        transform: translateX(0);
    }
    .card:hover .cart-img{
        transform: translateX(0);
    }
   /* .translate{
        width: 400px;
        height: 300px;
        background-color: aqua;
    }
    .box{
        width: 100px;
        height: 100px;
        background-color: red;
        transform: translateX(100px,50px);
    }*/
</style>
<body>
    <div class="card">
        <div class="cart-img">
            <img src="https://i.pinimg.com/736x/cb/fe/8d/cbfe8d1d9178d5a2fce0465a65116254.jpg" alt="">
        </div>
        <div class="button-click">
            <button>Add Card</button>
        </div>
        <div class="absolute">

        </div>
    </div>

</body>
</html>
