<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check</title>
</head>
<style>
    input{
        width: 100px;
        height: 100px;
        margin: auto;
    }
</style>
<body>
    <input checked type="checkbox" placeholder="checked">
    <input disabled type="checkbox" placeholder="disabled">
    <input type="checkbox">
    <select>
        <option disabled selected value="">Select Gender</option>
        <option value="">Male</option>
        <option value="">Female</option>
    </select>
</body>
</html>
