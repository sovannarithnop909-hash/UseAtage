<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visibility</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box1{
            width: 200px;
            height: 200px;
            background-color: rgb(45, 19, 139);
            visibility: hidden; 
        }
        .box2{
            width: 200px;
            height: 200px;
            background-color: aqua;
           
        }
        .box3{
            width: 200px;
            height: 200px;
            background-color: rgb(216, 20, 20);
        }
    </style>
</head>
<body>
    
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
