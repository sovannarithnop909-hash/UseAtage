<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.control{
    width: 600px;
    height: 600px;
    align-items: center;
    justify-content: center;
    margin: auto;
    margin-top: 200px;
}

img{
    width: 100px;
    height: 100px;
    animation: love 0.01s infinite;
}
@keyframes love{
    0%{
        transform: scale(1.3);
    }
    100%{
        transform: scale(1.5);
    }
}
</style>
<body>
    <div class="control">
        <img src="download (2).png" alt="">
    </div>
</body>
</html>
