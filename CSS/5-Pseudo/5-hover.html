<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }
        body{
            display: flex;
        }
        .box1{
            width: 100px;
            height: 100px;
            background-color: royalblue;
            transition: all 0.5s ease-in-out;
            margin-left: 100vh;
            margin-top: 50px;
        }
        .box1:hover{
            
            border-radius: 20px ;
        }
        .box1,.text{
            color: aliceblue;
      
        }
        .box1:hover .text{
            color: rgb(4, 255, 255);
            display: block;
        }
        img{
            width: 100%;
            height: 100%;
            display: none;

        }
        .box1:hover img{
            display: block;
        }
        button{
            width: 200px;
            height: 40px;
            background-color: blanchedalmond;
            transition: all 0.5 ease;
            border-radius: 20px     ;
        }
        button:active{
            background-color: rgb(36, 204, 112);
        }
        input{
            width: 200px;
            height: 40px;
            background-color: aquamarine;
            transition: all 0.6 ease-in-out;
            border-radius: 20px;
        }
        input:active{
            background-color: brown;
        }
        .focus{
            width: 200px;
            height: 40px;
            background-color: aquamarine;
            transition: all 0.6 ease-in-out;
            border-radius: 20px;
        }
        .focus:focus{
            background-color: brown;
        }

    </style>
</head>
<body>
    <div class="box1">
        <p class="text">this is hover</p>
        <img src="https://i.pinimg.com/originals/1f/a2/2b/1fa22befc10e3cbacd58c5b407a97997.gif" alt="">
    </div>
    <div class="button">
        <button>click me now</button>
        <input type="text" placeholder="enter your name">
    </div>
    <input class="focus"  type="text" placeholder="focus">
</body>
</html>
