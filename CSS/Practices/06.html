<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shoe Card</title>
  <link rel="stylesheet" href="06.css">
</head>
<body>

  <div class="card">
    <h2>ORIGINAL COLOR SHOES</h2>
    <p class="sub">SHOES WITH DIFFERENT COLOR AND BACKGROUND</p>

    <img src="https://pngimg.com/uploads/running_shoes/running_shoes_PNG5816.png" alt="shoe">

    <div class="colors">
      <span class="c1"></span>
      <span class="c2"></span>
      <span class="c3"></span>
      <span class="c4"></span>
    </div>

    <div class="bottom">
      <span class="price">$90</span>
      <button>ADD TO CART</button>
    </div>
  </div>

</body>
</html>
