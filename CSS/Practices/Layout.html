<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design layout</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        border: 2px solid floralwhite;
    }
    header,nav,footer{
        width: 100%;
        height: 15vh;
    }
    nav{
        background-color: cadetblue;
    }
    header,footer{
        background-color: blue;
    }
    main{
        width: 100%;
        height: 55vh;
        display: flex;
        background-color: chartreuse;
    }
    main > .left{
        width: 30%;
        height: 100%;
        background-color: aquamarine;
    }
    main >.right{
        width: 70%;
        height: 100%;
        background-color: pink;
    }
    main >.right >.top , main > .right >.bottom{
        width: 100%;
        height: 50%;
    }
    main > .right >.top{
        background-color: red;
    }
    .item{
        display: flex;
        align-items: center;
        justify-content: center;
        color: floralwhite;
        font-size: 30px;
        gap: 20px;
    }
</style>
<body>
    <header class="item">Header</header>
    <nav class="item">Naviate</nav>
    <main>
        <div class="left item">Aside</div>
        <div class="right">
            <div class="top item">Content</div>
            <div class="bottom item">Section</div>
        </div>
    </main>
    <footer class="item">Footer</footer>

</body>
</html>
