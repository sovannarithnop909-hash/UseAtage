<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .cantainer {
      width: 100%;
      height: 100vh;
    }

    .nav {
      width: 100%;
      height: 60px;
      padding: 0px 30px;
      background-color: #1b3351;
      display: flex;
      position: sticky;
      top: 0;
      justify-content: space-between;
    }

    .nav .logo {
      width: 130px;
      height: 100%;
      padding: 10px 5px;
    }

    .logo img {
      width: 100%;
      height: 100%;
    }

    ul {
      height: 100%;
      display: flex;
      gap: 60px;
      align-items: center;
    }

    li {
      color: white;
      font-size: 25px;
      list-style: none;
    }

    .menu {
      display: none;
    }

    .product {
      display: grid;
      grid-template-columns: repeat(4, 360px);
      grid-template-rows: repeat(4, 200px);
      gap: 20px;
    }

    .product div {
      background-color: aqua;
    }

    @media (max-width: 1200px) {
      li {
        display: none;
      }

      .menu {
        display: flex;
      }

      .product {
        grid-template-columns: repeat(3, 360px);
      }
    }
  </style>

  <body>
    <div class="cantainer">
      <div class="nav">
        <div class="logo">
          <img
            src="https://www.acledabank.com.kh/kh/assets/layout/logo3.png"
            alt=""
          />
        </div>

        <div class="option">
          <ul class="">
            <li>Home</li>
            <li>Contact</li>
            <li>Setting</li>
            <li>About</li>

            <svg
              class="menu"
              style="fill: aliceblue"
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="-960 960 960 960"
              width="24px"
              fill="#000000"
            >
              <path
                d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
              />
            </svg>
          </ul>
        </div>
      </div>

      <div class="product">
        <div class="product1"></div>
        <div class="product2"></div>
        <div class="product3"></div>
        <div class="product4"></div>
        <div class="product5"></div>
        <div class="product6"></div>
      </div>
    </div>
  </body>
</html>
