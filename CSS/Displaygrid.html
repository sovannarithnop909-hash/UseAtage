<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Grid</title>
</head>
<style>
    .parent{
        width: 700px;
        height: 700px;
        display: grid;   
        grid-template-columns: repeat(5,200px);  /*grid-template-columns: 100px 200px 300px 100px; col ប្រើផ្សេង row ប្រើផ្សេង */ 
        grid-template-rows: 50px 50px 50px 50px;
        gap: 10px;
    }
    .child{
        border: 1px solid black;
        background-color: none;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
 
    .parent div{
        background-color: skyblue;
    }
    .child0{
        grid-column: span 5;
    }
    .child1{
        grid-column: span 1;
    }
    .child2{
        grid-column: span 2;
    }
    .child5{
        grid-column: span 4;
    }
    .child7{
        grid-column: span 5;
    }
   
</style>
<body>
    <div class="parent">    
        <div class="child child0">Student</div>
        <div class="child child1">No</div>
        <div class="child child2">Name</div>
        <div class="child child3">Score</div>
        <div class="child child4">1</div>
        <div class="child child5">Chy Rith</div>
        <div class="child child6">99.99</div>
        <div class="child child7">Total students: 1</div>
    </div>
    
</body>
</html>
